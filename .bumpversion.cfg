[bumpversion]
current_version = 0.3.0
commit = True
tag = True
tag_name = v{new_version}
message = chore: bump cuik_molmaker version {current_version} -> {new_version}
allow_dirty = False
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(?P<pre>rc\d+)?(?P<post>post\d+)?
serialize = 
	{major}.{minor}.{patch}{pre}{post}
	{major}.{minor}.{patch}{pre}
	{major}.{minor}.{patch}{post}
	{major}.{minor}.{patch}

[bumpversion:file:setup.py]
search = CUIK_MOLMAKER_VERSION = "{current_version}"
replace = CUIK_MOLMAKER_VERSION = "{new_version}"

[bumpversion:file:CMakeLists.txt]
serialize = {major}.{minor}.{patch}
search = project(cuik_molmaker_cpp VERSION {current_version} LANGUAGES CXX)
replace = project(cuik_molmaker_cpp VERSION {new_version} LANGUAGES CXX)
